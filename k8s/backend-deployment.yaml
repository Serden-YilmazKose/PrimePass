apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: backend
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: backend
    spec:
      containers:
        - env:
            - name: DB_HOST
              value: mariadb
            - name: DB_NAME
              value: primepass_db
            - name: DB_PASSWORD
              value: pass
            - name: DB_USER
              value: root
          image: backend:latest
          imagePullPolicy: Never
          name: primepass-backend
          ports:
            - containerPort: 5000
              protocol: TCP
      restartPolicy: Always
