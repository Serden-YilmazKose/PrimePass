apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      labels:
        io.kompose.service: frontend
    spec:
      containers:
        - image: frontend:latest
          imagePullPolicy: IfNotPresent
          name: primepass-frontend
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
