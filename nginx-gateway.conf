server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri /index.html;
    }

    # User service – login/registration
    location = /api/login {
        proxy_pass http://user-service:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Event service – list events
    location = /api/events {
        proxy_pass http://event-service:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Ticket service – purchase and orders
    location = /api/purchase {
        proxy_pass http://ticket-service:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/orders {
        proxy_pass http://ticket-service:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Recommendation service – activity logging and recommendations
    location = /api/activity {
        proxy_pass http://recommendation-service:5004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/recommendations/[^/]+$ {
        proxy_pass http://recommendation-service:5004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}