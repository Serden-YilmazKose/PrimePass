services:
  mariadb_primary:
    image: mariadb:11
    container_name: mariadb_primary
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: pass
      MARIADB_DATABASE: primepass_db
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: primepass_db 
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
    volumes:
      - mariadb_primary_data:/var/lib/mysql

  mariadb_replica1:
    image: mariadb:11
    container_name: mariadb_replica1
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: pass
      MYSQL_ROOT_PASSWORD: pass
    command: >
      --server-id=2
    volumes:
      - mariadb_replica1_data:/var/lib/mysql
    depends_on:
      - mariadb_primary

  backend:
    build:
      context: ./backend
    container_name: primepass_backend
    restart: always
    environment:
      DB_HOST: mariadb_primary
      DB_USER: root
      DB_PASSWORD: pass
      DB_NAME: primepass_db
    depends_on:
      - mariadb_primary
    ports:
    - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: primepass_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mariadb_primary_data:
  mariadb_replica1_data: